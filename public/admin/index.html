<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>CMS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; overflow: hidden; }
    #cms { position: relative; }
    #cms .contentStart { position: absolute; visibility: hidden; pointer-events: none; width: 1px; height: 1px; }
  </style>
</head>
<body>
  <div id="cms"><span class="contentStart"></span></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" crossorigin="anonymous"></script>
  <script>
    (function() {
      function init(t) {
        function ready() {
          if (window.CMS) {
            window.CMS.init({
              backend: t ? { name: 'github', repo: 'sikenali/momowuwen', branch: 'main', auth_type: 'token', token: t } : null,
              locale: { root: { languageName: '简体中文' }, locales: { 'zh_Hans': '简体中文' } }
            });
          } else { setTimeout(ready, 50); }
        }
        ready();
      }
      
      try {
        var token = localStorage.getItem('cms_token');
        if (token) init(token);
      } catch(e) { /* no storage */ }
    })();
  </script>
</body>
</html>
