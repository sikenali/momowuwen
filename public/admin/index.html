<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>CMS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <div id="cms"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" crossorigin="anonymous"></script>
  <script>
    (function() {
      function ready() {
        if (window.CMS) {
          var token = localStorage.getItem('cms_token');
          window.CMS.init({
            backend: token ? { name: 'github', repo: 'sikenali/momowuwen', branch: 'main', auth_type: 'token', token: token } : null,
            locale: { root: { languageName: '简体中文' }, locales: { 'zh_Hans': '简体中文' } }
          });
        } else {
          setTimeout(ready, 50);
        }
      }
      ready();
    })();
  </script>
</body>
</html>
