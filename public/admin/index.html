<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Admin</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #cms { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <div id="cms"><span id="cms-placeholder"></span></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" crossorigin="anonymous"></script>
  <script>
    // Init CMS when loaded
    var token = localStorage.getItem('decap_cms_token');
    
    function initCMS() {
      if (window.CMS) {
        window.CMS.init({
          backend: {
            name: 'github',
            repo: 'sikenali/momowuwen',
            branch: 'main',
            auth_type: token ? 'token' : 'pkce',
            token: token
          }
        });
      } else {
        setTimeout(initCMS, 50);
      }
    }
    initCMS();
  </script>
</body>
</html>
