<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <title>CMS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      var observer = new MutationObserver(function() {
        var shadowRoots = [];
        function findRoots(el) {
          if (el.shadowRoot) {
            shadowRoots.push(el.shadowRoot);
            el.shadowRoot.querySelectorAll('*').forEach(findRoots);
          }
        }
        findRoots(document.body);
        shadowRoots.forEach(function(root) {
          var existing = root.querySelector('.cms-custom-style');
          if (!existing) {
            var s = root.createElement('style');
            s.className = 'cms-custom-style';
            s.textContent = `
              app-nav-bar img[src*="favicon"],
              .logo.svelte-7ua6x9 { max-height: 24px !important; width: auto !important; display: block !important; }
              
              :host { font-size: 24px !important; }
              
              .side-nav, .primary-sidebar, .secondary-sidebar,
              .listing-grid, .entry-list-item, .page-container,
              [class*="sidebar"], [class*="nav"], [class*="list"],
              .entry-preview, .content-title,
              .settings-modal, .notification,
              [class*="dialog"], [class*="modal"], [class*="popup"] {
                font-size: 20px !important;
              }
              
              .editor-toolbar, .code-editor, textarea, input, select,
              [class*="field"], [class*="input"], [class*="button"], [class*="btn"],
              [class*="label"], [class*="heading"] {
                font-size: 20px !important;
              }
              
              h1, h2, h3, h4, h5, h6 {
                font-size: 1.5em !important;
              }
              
              .content-title, .entry-title {
                font-size: 1.4em !important;
              }
              
              .quick-search-bar {
                font-size: 20px !important;
              }
            `;
            root.appendChild(s);
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });
  </script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
