<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Admin</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #cms { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <div id="cms"></div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js" crossorigin="anonymous"></script>
  <script>
    window.addEventListener('load', function() {
      var token = localStorage.getItem('decap_cms_token');
      if (token && window.CMS) {
        window.CMS.init({
          backend: {
            name: 'github',
            repo: 'sikenali/momowuwen',
            branch: 'main',
            auth_type: 'token',
            token: token
          }
        });
      }
    });
  </script>
</body>
</html>
